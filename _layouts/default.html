<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace }}">
    <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
    {% feed_meta %}
    {% seo title=false %}
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{{ "/" | relative_url }}" aria-label="{{ site.title }} 홈">
        <span class="brand__sigil">달빛</span>
        <span>{{ site.title }}</span>
      </a>
      <nav class="site-nav" aria-label="주요 메뉴">
        <a href="{{ "/" | relative_url }}">홈</a>
        <a href="{{ "/wow/" | relative_url }}">와우 자료실</a>
        <a href="{{ "/classes/" | relative_url }}">클래스 가이드</a>
        <a href="{{ "/about/" | relative_url }}">소개</a>
      </nav>
    </header>

    <main>
      {{ content }}
    </main>

    <footer class="site-footer">
      <p>{{ site.title }} · 와우 자료실과 클래스별 가이드</p>
      <p>게임 스트리머 달빛여운</p>
    </footer>
  </body>
</html>
